<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RP Utility — Story Recap</title>
  <link rel="stylesheet" href="/static/style.css?v={{CACHE_VER}}">
  <script>window.__SESSION_ID__ = "{{SESSION_ID}}";</script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    /* ── Recap-specific layout ─────────────────────────────────────────── */
    .recap-layout { min-height: 100vh; display: flex; flex-direction: column; }

    .recap-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border); gap: 16px; flex-shrink: 0;
    }
    .recap-header-center { flex: 1; text-align: center; }
    .recap-header-title { font-size: 18px; font-weight: 800; }
    .recap-header-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    .recap-body {
      flex: 1; padding: 32px 24px; max-width: 860px; width: 100%;
      margin: 0 auto; display: flex; flex-direction: column; gap: 28px;
    }

    /* ── Narrative block ───────────────────────────────────────────────── */
    .recap-narrative {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .recap-narrative-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--surface2), var(--surface));
    }
    .recap-narrative-header h2 {
      font-size: 15px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px;
    }
    .recap-narrative-body { padding: 24px; }
    .recap-text {
      font-size: 15px; line-height: 1.85; color: var(--text);
    }
    .recap-text p { margin-bottom: 1.2em; }
    .recap-text p:last-child { margin-bottom: 0; }
    .recap-generating {
      display: flex; align-items: center; gap: 12px;
      color: var(--text-muted); font-size: 14px; padding: 8px 0;
    }
    .recap-spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--accent-light); border-radius: 50%;
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .recap-error { color: var(--red); font-size: 14px; padding: 8px 0; }

    /* ── Info cards grid ───────────────────────────────────────────────── */
    .recap-cards {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .recap-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .recap-card-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted);
      background: var(--surface2); display: flex; align-items: center; gap: 8px;
    }
    .recap-card-body { padding: 14px 16px; }
    .recap-card-row { margin-bottom: 10px; }
    .recap-card-row:last-child { margin-bottom: 0; }
    .recap-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin-bottom: 2px; }
    .recap-card-value { font-size: 13px; color: var(--text); line-height: 1.4; }

    /* ── Wide sections (rels, objectives, npcs) ────────────────────────── */
    .recap-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .recap-section-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted);
      background: var(--surface2); display: flex; align-items: center; gap: 8px;
    }
    .recap-section-body { padding: 16px 20px; }

    /* Relationships */
    .rel-list { display: flex; flex-direction: column; gap: 10px; }
    .rel-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .rel-names { font-size: 13px; font-weight: 600; min-width: 160px; }
    .rel-summary { font-size: 13px; color: var(--text-muted); flex: 1; }
    .rel-bars { display: flex; gap: 6px; align-items: center; }
    .rel-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .rel-bar-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
    .rel-bar-track {
      width: 48px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .rel-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .bar-trust { background: var(--green); }
    .bar-affection { background: #ec4899; }
    .bar-respect { background: var(--accent-light); }
    .bar-hostility { background: var(--red); }
    .bar-fear { background: var(--yellow); }

    /* Objectives */
    .obj-list { display: flex; flex-direction: column; gap: 8px; }
    .obj-row { display: flex; align-items: flex-start; gap: 10px; }
    .obj-status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
    }
    .dot-active { background: var(--green); }
    .dot-completed { background: var(--accent-light); }
    .dot-failed { background: var(--red); }
    .dot-abandoned { background: var(--text-dim); }
    .obj-title { font-size: 13px; font-weight: 600; }
    .obj-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* NPCs */
    .npc-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .npc-chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; font-size: 13px;
    }
    .npc-chip-name { font-weight: 600; }
    .npc-chip-role { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body class="recap-layout">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header class="recap-header">
    <a href="/chat/{{SESSION_ID}}" class="btn btn-ghost btn-sm">← Back to Chat</a>
    <div class="recap-header-center">
      <div class="recap-header-title" id="recap-session-title">Loading…</div>
      <div class="recap-header-sub" id="recap-session-sub"></div>
    </div>
    <button class="btn btn-secondary btn-sm" id="regenerate-btn" onclick="loadRecap(true)">↺ Regenerate</button>
  </header>

  <!-- ── Body ───────────────────────────────────────────────────────── -->
  <div class="recap-body">

    <!-- Narrative -->
    <div class="recap-narrative">
      <div class="recap-narrative-header">
        <h2>📖 Previously on…</h2>
        <span id="recap-clock" style="font-size:12px;color:var(--text-dim)"></span>
      </div>
      <div class="recap-narrative-body">
        <div id="recap-text-area" class="recap-text">
          <div class="recap-generating">
            <div class="recap-spinner"></div>
            <span>Generating your story recap…</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Scene + session stats side by side -->
    <div class="recap-cards" id="recap-cards">
      <!-- populated by JS -->
    </div>

    <!-- Objectives -->
    <div class="recap-section" id="objectives-section" style="display:none">
      <div class="recap-section-header">🎯 Active Objectives</div>
      <div class="recap-section-body">
        <div class="obj-list" id="objectives-list"></div>
      </div>
    </div>

    <!-- Relationships -->
    <div class="recap-section" id="rels-section" style="display:none">
      <div class="recap-section-header">🤝 Key Relationships</div>
      <div class="recap-section-body">
        <div class="rel-list" id="rels-list"></div>
      </div>
    </div>

    <!-- NPCs -->
    <div class="recap-section" id="npcs-section" style="display:none">
      <div class="recap-section-header">🧑‍🤝‍🧑 Characters Encountered</div>
      <div class="recap-section-body">
        <div class="npc-grid" id="npcs-grid"></div>
      </div>
    </div>

  </div><!-- end recap-body -->

  <script>
    const SESSION_ID = window.__SESSION_ID__;
    if (typeof marked !== "undefined") marked.setOptions({ breaks: true, gfm: true });

    // ── Boot ──────────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => loadRecap(false));

    async function loadRecap(forceRegenerate = false) {
      const textArea = document.getElementById("recap-text-area");
      const regenBtn = document.getElementById("regenerate-btn");

      textArea.innerHTML = '<div class="recap-generating"><div class="recap-spinner"></div><span>Generating your story recap…</span></div>';
      if (regenBtn) regenBtn.disabled = true;

      try {
        const res = await fetch(`/api/session/${SESSION_ID}/recap/full`);
        if (!res.ok) throw new Error("Server error " + res.status);
        const data = await res.json();

        // Header
        if (data.session) {
          document.getElementById("recap-session-title").textContent = data.session.name || "Story Recap";
          document.getElementById("recap-session-sub").textContent =
            `${data.session.character_name}  ·  ${data.session.turn_count} turns`;
        }

        // Clock
        if (data.clock && data.clock.display) {
          document.getElementById("recap-clock").textContent = data.clock.display;
        }

        // Narrative
        if (data.recap) {
          const html = (typeof marked !== "undefined")
            ? marked.parse(data.recap)
            : data.recap.replace(/\n\n/g, "</p><p>").replace(/^/, "<p>").replace(/$/, "</p>");
          textArea.innerHTML = html;
        } else {
          textArea.innerHTML = '<span style="color:var(--text-muted);font-size:14px">No story content yet — start playing to generate a recap.</span>';
        }

        // Cards
        buildCards(data);

        // Objectives
        buildObjectives(data.objectives || []);

        // Relationships
        buildRelationships(data.relationships || []);

        // NPCs
        buildNpcs(data.npcs || []);

      } catch (err) {
        textArea.innerHTML = `<div class="recap-error">Error generating recap: ${err.message}</div>`;
      } finally {
        if (regenBtn) regenBtn.disabled = false;
      }
    }

    // ── Cards ──────────────────────────────────────────────────────────────
    function buildCards(data) {
      const container = document.getElementById("recap-cards");
      container.innerHTML = "";

      // Scene card
      if (data.scene) {
        const s = data.scene;
        const card = makeCard("📍 Current Scene", [
          { label: "Location", value: s.location || "Unknown" },
          { label: "Present", value: s.active_characters && s.active_characters.length
              ? s.active_characters.join(", ") : "—" },
          { label: "What's happening", value: s.summary || "—" },
        ]);
        container.appendChild(card);
      }

      // Session card
      if (data.session) {
        const rows = [
          { label: "Story name", value: data.session.name },
          { label: "Main character", value: data.session.character_name },
          { label: "Turns played", value: String(data.session.turn_count) },
        ];
        if (data.clock && data.clock.display) {
          rows.push({ label: "In-world time", value: data.clock.display });
        }
        container.appendChild(makeCard("📊 Story Stats", rows));
      }
    }

    function makeCard(header, rows) {
      const card = document.createElement("div");
      card.className = "recap-card";
      card.innerHTML = `<div class="recap-card-header">${esc(header)}</div>`;
      const body = document.createElement("div");
      body.className = "recap-card-body";
      rows.forEach(r => {
        const row = document.createElement("div");
        row.className = "recap-card-row";
        row.innerHTML = `<div class="recap-card-label">${esc(r.label)}</div><div class="recap-card-value">${esc(r.value)}</div>`;
        body.appendChild(row);
      });
      card.appendChild(body);
      return card;
    }

    // ── Objectives ─────────────────────────────────────────────────────────
    function buildObjectives(objectives) {
      const section = document.getElementById("objectives-section");
      const list = document.getElementById("objectives-list");
      const active = objectives.filter(o => o.status === "active");
      if (!active.length) { section.style.display = "none"; return; }
      section.style.display = "";
      list.innerHTML = active.map(o => `
        <div class="obj-row">
          <div class="obj-status-dot dot-active"></div>
          <div>
            <div class="obj-title">${esc(o.title)}</div>
            ${o.description ? `<div class="obj-desc">${esc(o.description)}</div>` : ""}
          </div>
        </div>`).join("");
    }

    // ── Relationships ──────────────────────────────────────────────────────
    function buildRelationships(rels) {
      const section = document.getElementById("rels-section");
      const list = document.getElementById("rels-list");
      if (!rels.length) { section.style.display = "none"; return; }
      section.style.display = "";
      list.innerHTML = rels.map(r => {
        const bars = [
          { label: "Trust", cls: "bar-trust", val: r.trust },
          { label: "Affection", cls: "bar-affection", val: r.affection },
          { label: "Respect", cls: "bar-respect", val: r.respect },
          { label: "Hostility", cls: "bar-hostility", val: r.hostility },
          { label: "Fear", cls: "bar-fear", val: r.fear },
        ].filter(b => Math.abs(b.val) > 0.05).map(b => {
          const pct = Math.min(100, Math.abs(b.val) * 100).toFixed(0);
          return `<div class="rel-bar-wrap">
            <div class="rel-bar-label">${esc(b.label)}</div>
            <div class="rel-bar-track"><div class="rel-bar-fill ${b.cls}" style="width:${pct}%"></div></div>
          </div>`;
        }).join("");
        return `<div class="rel-row">
          <div class="rel-names">${esc(r.source)} → ${esc(r.target)}</div>
          <div class="rel-summary">${esc(r.summary || "")}</div>
          <div class="rel-bars">${bars}</div>
        </div>`;
      }).join("");
    }

    // ── NPCs ───────────────────────────────────────────────────────────────
    function buildNpcs(npcs) {
      const section = document.getElementById("npcs-section");
      const grid = document.getElementById("npcs-grid");
      if (!npcs.length) { section.style.display = "none"; return; }
      section.style.display = "";
      grid.innerHTML = npcs.map(n => `
        <div class="npc-chip">
          <div class="npc-chip-name">${esc(n.name)}</div>
          ${n.role ? `<div class="npc-chip-role">${esc(n.role)}</div>` : ""}
        </div>`).join("");
    }

    function esc(t) {
      if (!t) return "";
      return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>

</body>
</html>
